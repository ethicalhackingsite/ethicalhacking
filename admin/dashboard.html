<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Admin</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.admin-layout {
  display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - var(--topbar-h));
}
/* Sidebar nav */
.admin-nav {
  background:#090b0f;border-right:1px solid var(--border);
  padding:24px 0;position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;
}
.admin-nav-section {
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--text-dim);padding:0 20px;margin:20px 0 8px;
}
.admin-nav-link {
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;
  color:var(--text-dim);text-decoration:none;letter-spacing:.5px;
  transition:background .15s,color .15s;border-left:2px solid transparent;
}
.admin-nav-link:hover  { background:var(--surface);color:var(--text-bright);border-left-color:var(--border); }
.admin-nav-link.active { background:var(--surface);color:var(--accent);border-left-color:var(--accent); }
.admin-nav-link .icon  { font-size:16px;width:20px;text-align:center;flex-shrink:0; }

/* Main area */
.admin-main { padding:36px 40px;overflow-y:auto; }
.page-title {
  font-family:'Rajdhani',sans-serif;font-weight:900;font-size:26px;
  color:var(--text-bright);letter-spacing:1px;text-transform:uppercase;
  margin-bottom:6px;
}
.page-sub { font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text-dim);margin-bottom:32px; }

/* Stats row */
.stats-row { display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:36px; }
.stat-card {
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:20px;border-top:2px solid var(--accent);
}
.stat-card-num { font-family:'Rajdhani',sans-serif;font-weight:900;font-size:36px;color:var(--accent);line-height:1; }
.stat-card-lbl { font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:4px; }

/* Module rows */
.module-row {
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  margin-bottom:3px;display:flex;align-items:center;gap:0;overflow:hidden;
  transition:border-color .15s;
}
.module-row:hover { border-color:var(--accent); }
.mod-drag { padding:0 12px;color:var(--text-dim);cursor:grab;font-size:18px;line-height:56px;user-select:none; }
.mod-info { flex:1;padding:12px 0 12px 4px;min-width:0; }
.mod-info-title { font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--text-bright); }
.mod-info-desc  { font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--text-dim);margin-top:2px; }
.mod-count { font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);padding:0 20px;white-space:nowrap; }
.mod-actions { display:flex;gap:6px;padding:0 12px; }

/* Article table */
.art-table { width:100%;border-collapse:collapse;font-size:14px; }
.art-table th {
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);
  background:#0f1118;padding:10px 14px;border-bottom:2px solid var(--accent);text-align:left;
}
.art-table td { padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle; }
.art-table tr:hover td { background:var(--surface); }
.art-table .art-title { font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;color:var(--text-bright); }
.pub-dot { display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px; }
.pub-dot.yes { background:var(--green); }
.pub-dot.no  { background:var(--red); }

/* Modal */
.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open { opacity:1;pointer-events:all; }
.modal {
  background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);
  border-radius:8px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  padding:32px;transform:translateY(10px);transition:transform .2s;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-title { font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;color:var(--text-bright);margin-bottom:24px;letter-spacing:.5px; }
.modal-footer { display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border); }

/* Confirm dialog */
.confirm-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.confirm-overlay.open { opacity:1;pointer-events:all; }
.confirm-box {
  background:var(--surface);border:1px solid var(--red);border-radius:8px;
  padding:28px;max-width:360px;width:100%;
}
.confirm-title { font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:var(--red);margin-bottom:10px; }
.confirm-msg   { font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text-dim);margin-bottom:20px;line-height:1.5; }
.confirm-footer { display:flex;gap:10px;justify-content:flex-end; }

@media (max-width:768px) {
  .admin-layout { grid-template-columns:1fr; }
  .admin-nav { position:static;height:auto;border-right:none;border-bottom:1px solid var(--border); }
  .admin-main { padding:20px; }
}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="../index.html">Ethical<span>Hacking</span> <span style="font-size:11px;letter-spacing:2px;color:var(--text-dim);margin-left:10px;font-weight:400;">ADMIN</span></a>
  <nav class="nav">
    <a href="../index.html">← View Site</a>
    <a href="#" onclick="doLogout();return false;" style="color:var(--red);">Logout</a>
  </nav>
</div>

<div class="admin-layout">
  <!-- Sidebar -->
  <nav class="admin-nav">
    <div class="admin-nav-section">Content</div>
    <a class="admin-nav-link active" href="dashboard.html" id="navDash"><span class="icon">📊</span> Dashboard</a>
    <a class="admin-nav-link" href="articles.html"><span class="icon">📝</span> Articles</a>
    <a class="admin-nav-link" href="modules.html"><span class="icon">📦</span> Modules</a>
    <div class="admin-nav-section">Site</div>
    <a class="admin-nav-link" href="settings.html"><span class="icon">⚙️</span> Settings</a>
    <a class="admin-nav-link" href="import-export.html"><span class="icon">💾</span> Backup / Restore</a>
  </nav>

  <!-- Main -->
  <main class="admin-main">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Overview of your course content.</div>

    <div class="stats-row" id="statsRow"></div>

    <div class="section-header">
      <span class="section-title">Modules</span>
      <div class="section-line"></div>
      <button class="btn btn-accent" onclick="openModModal()">+ New Module</button>
    </div>
    <div id="modulesList"></div>

    <div class="section-header" style="margin-top:40px;">
      <span class="section-title">Recent Articles</span>
      <div class="section-line"></div>
      <a class="btn btn-accent" href="articles.html">Manage All</a>
    </div>
    <table class="art-table" id="recentTable">
      <thead><tr>
        <th>Title</th><th>Module</th><th>Difficulty</th><th>Published</th><th>Actions</th>
      </tr></thead>
      <tbody id="recentBody"></tbody>
    </table>
  </main>
</div>

<!-- Module Modal -->
<div class="modal-overlay" id="modModal">
  <div class="modal">
    <div class="modal-title" id="modModalTitle">New Module</div>
    <input type="hidden" id="modId">
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="modTitle" placeholder="e.g. DLL Injection">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="modDesc" placeholder="Short description of this module">
    </div>
    <div class="form-group">
      <label class="form-label">Order</label>
      <input class="form-input" type="number" id="modOrder" value="1" min="1">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveModule()">Save Module</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-footer">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmOkBtn">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../js/store.js"></script>
<script>
// Auth guard
if (!EH.checkAuth()) { location.href = 'login.html'; }

function doLogout() { EH.logout(); location.href = 'login.html'; }

// ── RENDER ──
function render() {
  const modules  = EH.getModules();
  const articles = EH.getArticles();
  const pubCount = articles.filter(a => a.published).length;

  // Stats
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-card-num">${modules.length}</div><div class="stat-card-lbl">Modules</div></div>
    <div class="stat-card"><div class="stat-card-num">${articles.length}</div><div class="stat-card-lbl">Total Articles</div></div>
    <div class="stat-card"><div class="stat-card-num">${pubCount}</div><div class="stat-card-lbl">Published</div></div>
    <div class="stat-card"><div class="stat-card-num">${articles.length - pubCount}</div><div class="stat-card-lbl">Drafts</div></div>`;

  // Modules list
  const ml = document.getElementById('modulesList');
  ml.innerHTML = '';
  modules.forEach(mod => {
    const artCount = articles.filter(a => a.moduleId === mod.id).length;
    const row = document.createElement('div');
    row.className = 'module-row';
    row.innerHTML = `
      <div class="mod-drag">⠿</div>
      <div class="mod-info">
        <div class="mod-info-title">${mod.order}. ${mod.title}</div>
        <div class="mod-info-desc">${mod.description}</div>
      </div>
      <div class="mod-count">${artCount} article${artCount !== 1 ? 's' : ''}</div>
      <div class="mod-actions">
        <button class="btn btn-ghost" style="padding:5px 12px;" onclick="editModule('${mod.id}')">Edit</button>
        <button class="btn btn-danger" style="padding:5px 12px;" onclick="confirmDeleteMod('${mod.id}','${mod.title}')">Delete</button>
      </div>`;
    ml.appendChild(row);
  });

  // Recent articles (last 8)
  const recent = [...articles].reverse().slice(0, 8);
  const modMap = {};
  modules.forEach(m => modMap[m.id] = m.title);
  document.getElementById('recentBody').innerHTML = recent.map(art => `
    <tr>
      <td><div class="art-title">${art.title}</div></td>
      <td style="font-family:Rajdhani,sans-serif;font-size:13px;color:var(--text-dim);">${modMap[art.moduleId] || '—'}</td>
      <td><span class="t-tag tag-${art.difficulty}" style="font-family:JetBrains Mono,monospace;font-size:10px;padding:2px 7px;border-radius:2px;">${art.difficulty}</span></td>
      <td><span class="pub-dot ${art.published ? 'yes' : 'no'}"></span>${art.published ? 'Published' : 'Draft'}</td>
      <td style="display:flex;gap:6px;">
        <a class="btn btn-ghost" style="padding:4px 10px;" href="edit-article.html?id=${art.id}">Edit</a>
        <a class="btn btn-blue"  style="padding:4px 10px;" href="../article.html?id=${art.id}" target="_blank">View</a>
      </td>
    </tr>`).join('');
}
render();

// ── MODULE MODAL ──
function openModModal(id) {
  if (id) {
    const mod = EH.getModules().find(m => m.id === id);
    document.getElementById('modModalTitle').textContent = 'Edit Module';
    document.getElementById('modId').value    = mod.id;
    document.getElementById('modTitle').value = mod.title;
    document.getElementById('modDesc').value  = mod.description;
    document.getElementById('modOrder').value = mod.order;
  } else {
    document.getElementById('modModalTitle').textContent = 'New Module';
    document.getElementById('modId').value    = '';
    document.getElementById('modTitle').value = '';
    document.getElementById('modDesc').value  = '';
    document.getElementById('modOrder').value = EH.getModules().length + 1;
  }
  document.getElementById('modModal').classList.add('open');
}
function closeModModal() { document.getElementById('modModal').classList.remove('open'); }
function editModule(id)  { openModModal(id); }

function saveModule() {
  const title = document.getElementById('modTitle').value.trim();
  const desc  = document.getElementById('modDesc').value.trim();
  const order = parseInt(document.getElementById('modOrder').value) || 1;
  if (!title) { showToast('Module title is required.', 'error'); return; }
  const id = document.getElementById('modId').value || EH.newModuleId();
  EH.saveModule({ id, title, description: desc, order });
  closeModModal();
  showToast('Module saved!');
  render();
}

// ── DELETE CONFIRM ──
let _confirmCb = null;
function openConfirm(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg;
  _confirmCb = cb;
  document.getElementById('confirmOkBtn').onclick = () => { cb(); closeConfirm(); };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }

function confirmDeleteMod(id, title) {
  openConfirm(`Delete module "${title}" and ALL its articles? This cannot be undone.`, () => {
    EH.deleteModule(id);
    showToast('Module deleted.');
    render();
  });
}

// Close modals on overlay click
document.getElementById('modModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModModal(); });
document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });
</script>
</body>
</html>
