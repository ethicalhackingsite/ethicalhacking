<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EthicalHacking</title>
<link rel="stylesheet" href="../css/main.css">
<style>
body { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px; }
.login-box {
  width:100%;max-width:400px;
  background:var(--surface);border:1px solid var(--border);
  border-top:3px solid var(--accent);border-radius:8px;padding:40px 36px;
}
.login-title {
  font-family:'Rajdhani',sans-serif;font-weight:900;font-size:28px;
  color:var(--text-bright);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px;
}
.login-sub { font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--text-dim);margin-bottom:32px;letter-spacing:.5px; }
.login-logo { font-family:'Rajdhani',sans-serif;font-weight:900;font-size:18px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;display:block; }
.login-logo span { color:var(--text-bright); }
.error-msg {
  background:#1e0a0a;border:1px solid var(--red);border-radius:4px;
  color:var(--red);font-family:'Rajdhani',sans-serif;font-size:13px;
  font-weight:600;padding:10px 14px;margin-bottom:18px;letter-spacing:.5px;
  display:none;
}
</style>
</head>
<body>
<div class="login-box">
  <a class="login-logo" href="../index.html">Ethical<span>Hacking</span></a>
  <div class="login-title">Admin Login</div>
  <div class="login-sub">Restricted area — course management only.</div>
  <div class="error-msg" id="errMsg">⚠ Incorrect password. Try again.</div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="pwInput" placeholder="Enter admin password" autofocus>
  </div>
  <button class="btn btn-accent" style="width:100%;padding:12px;" onclick="doLogin()">Login →</button>
  <p style="margin-top:16px;font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--text-dim);letter-spacing:.5px;">
    Default password: <code style="color:var(--accent);">changeme2025</code> — change it in Settings after first login.
  </p>
</div>
<div id="toast"></div>
<script src="../js/store.js"></script>
<script>
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (EH.login(pw)) {
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('errMsg').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</html>
